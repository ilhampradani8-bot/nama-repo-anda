    # HTTP Status Code

    ----

    <table style="width:100%">
      <tr>
        <th>HTTP Status Code</th>
        <th>Description</th>
      </tr>
      <tr>
        <td>200</td>
        <td>Operation has been retrieved</td>
      </tr>
      <tr>
        <td>400 </td>
        <td>Bad Request</td>
      </tr>
      <tr>
        <td>401</td>
        <td>Invalid Authorization or IP Not Whitelisted. When IP is not on the whitelist, response body contains code "ClientUnauthorizedError" and message "Invalid IP".</td>
      </tr>
      <tr>
        <td>403</td>
        <td>Forbidden Access</td>
      </tr>
      <tr>
        <td>404</td>
        <td>Resource not found</td>
      </tr>
      <tr>
        <td>500</td>
        <td>Server error</td>
      </tr>
      <tr>
        <td>503</td>
        <td>Product in problem / closed</td>
      </tr>
      <tr>
        <td>429</td>
        <td>Too many request</td>
      </tr>
    </table>

     > ⚠️ **If you got an error 500 or some network issue 
     we suggest you to mapping it to pending and please hit our "check status" end point 
     and/or follow up with our operation team for this matter. **


      # Event Broadcast

      ----

      Billfazz will inform related with status product via webhook URL or telegram for every product changes include:
      - Flag problem updated
      - Flag active updated
      - Price changes


      You can inform your webhook URL or your telegram ID to us.

      ## Webhook

      Billfazz will send HTTP POST request to client webhook URL

      Sample webhook request:
      - Flag problem updated
      
      ```
      {
          "eventName": "productStatus",
          "productCode": "AXIS10",
          "data": {
            "problem": false
          }
      }
      ```
      
      - Flag active updated
      ```
      {
          "eventName": "clientProductStatusActive",
          "productCode": "AXIS10",
          "data": {
            "problem": false
          }
        }
      ```

      - Price changes
      ```
      {
          "eventName": "clientProductPriceMargin",
          "productCode": "AXIS10",
          "data": {
            "oldPrice": 10560,
            "intPrice": 10810,
            "problem": false
          }
      }
      ```



      > `productCode` could change based on the event and problem could be `true` or `false`. <br/>
      > `oldPrice` is the previous price and `intPrice` is the new price.


      ## Telegram

      Sample message from bot:
      - Flag problem updated
      ```
      Axis 10.000 [AXIS10] - CLOSE ❌
      Axis 50.000 [AXIS50] - OPEN ✅
      ```
      - Flag active updated
      ```
      Axis 10.000 [AXIS10] - CLOSE ❌
      Axis 50.000 [AXIS50] - OPEN ✅
      ```
      - Price changes
      ```
      Axis 10.000 [AXIS10] = Rp.9.100 -> Rp.9.210 

      Mohon dikondisikan 🙏🏻
      ```

      ```
      Axis 50.000 [AXIS50] = Rp.49.320 -> Rp.49.080 

      Silahkan ditransaksikan 👍🏻
      ```

tags:
  - name: Prepaid
  - name: Postpaid
  - name: Advice
  - name: Issue E-Wallet Open Amount and Game
  - name: Inquiry E-Wallet Open Amount and Game
  - name: Product
  - name: Test
  - name: Fazz Connect
    description: |
      When the API client has no payment methods configured, the checkout flow redirects the end-user to a **Fazz Connect URL** to complete payment. The base URL is configured by the client (examples in this doc use `https://fazz.id/` as a placeholder). Billfazz appends transaction parameters to the query string so that the Fazz Connect page lands on the correct product and destination.

      ## Redirect URL Format

      ```
      {fazzConnectBaseUrl}?destinationNo={destinationNo}&productCode={productCode}&{field1}={value1}&{field2}={value2}
      ```

      - `{fazzConnectBaseUrl}` is set by the client (e.g. `https://fazz.id/`, `https://checkout.example.com/`, etc.).
      - `destinationNo` is URL-encoded. Commas inside a multi-field destination are encoded as `%2C`.

      ## Query Parameters

      <table width="100%">
        <tr>
          <th>Parameter</th>
          <th>Required</th>
          <th>Description</th>
        </tr>
        <tr>
          <td>destinationNo</td>
          <td>Yes</td>
          <td>Destination identifier. For multi-field products it is a comma-joined string, in the same format as destinationNo in the Prepaid Game request body.</td>
        </tr>
        <tr>
          <td>productCode</td>
          <td>Yes</td>
          <td>Billfazz product code (e.g. MOBILE_LEGEND28).</td>
        </tr>
        <tr>
          <td>Per-field params</td>
          <td>Yes</td>
          <td>One query parameter per destination field (e.g. user_id, zone_id, server_id, server_list). Each value must match the corresponding component of destinationNo.</td>
        </tr>
      </table>

      ## Example (mobile_legend)

      Assuming the client has configured `https://fazz.id/` as its Fazz Connect base URL:

      ```
      https://fazz.id/?destinationNo=12345678%2C1234&productCode=MOBILE_LEGEND28&user_id=12345678&zone_id=1234
      ```

      - `destinationNo` = `12345678,1234` (URL-encoded as `12345678%2C1234`)
      - `productCode` = `MOBILE_LEGEND28`
      - `user_id` = `12345678`
      - `zone_id` = `1234`

      ## Destination Field Mapping per Game

      ### Single-field (`user_id` only)

      For these game codes, `destinationNo` equals `user_id`, and the only extra query parameter is `user_id`:

      `codm`, `coc`, `hago`, `draconia_saga`, `ea_sports`, `8ball_pool`, `free_fire`, `hok`, `werewolf`, `point_blank`, `pubg`, `clash_royale`, `aov`, `league_of_legends`, `lords_mobile`

      Example:

      ```
      https://fazz.id/?destinationNo=123456789&productCode=FREE_FIRE10&user_id=123456789
      ```

      ### Multi-field (comma-separated)

      <table width="100%">
        <tr>
          <th>Game code</th>
          <th>destinationNo format</th>
          <th>Query parameters</th>
        </tr>
        <tr>
          <td>ragnarok</td>
          <td>user_id,server_id</td>
          <td>user_id, server_id</td>
        </tr>
        <tr>
          <td>genshin_impact</td>
          <td>user_id,server_list</td>
          <td>user_id, server_list (Asia / America / Europe / Tw_hk_mo)</td>
        </tr>
        <tr>
          <td>mobile_legend</td>
          <td>user_id,zone_id</td>
          <td>user_id, zone_id</td>
        </tr>
      </table>

      ## Product List with Fazz Connect

      When the Fazz Connect feature is enabled for the client, each product in the `GET /products/client` response includes an extra `webappPrice` field — the price (in Rupiah) that will be charged to the end user on the Fazz Connect checkout page (equivalent to `committedSellPrice`). See the [Get List of Products](#operation/get-products-client) operation below for the full parameter list, response schema, and sample request/response.


