  version: 1.0.0-oas3
  title: Billfazz API Documentation
  x-logo:
    url: https://billfazz.com/_next/image?url=%2Fimages%2Flg_billfazz_dynamic.svg&w=3840&q=75
    width: 50%
  contact:
    email: partners@billfazz.com
  description: >
    # Introduction 

    ----

    Billfazz is a financial service solution that focuses on providing a Payment Point Online Bank (PPOB) system that can help clients to sell data packages, pulsa, telephone bills, BPJS, PLN (tokens and bills), and etc. 
    This is an API documentation that can be used for the integration system process between Billfazz and Clients (for all services).

    ## Overview 

    This section contain an overview of the data provided and the API Purpose.


    * Getting Started - Introduces you to the operations offered by the API.


    * API Calls - Explore the API Billfazz here


    * Field Reference - Describes the type of information provided by the API


    * Sandbox Mode - Each Product type sometimes has different response in
    reference or result object key. Feel free to use this feature. 


    * Response Code (RC) - Describes the response code in body response  


    * HTTP Status Code - Some HTTP Status code will return another code (except
    200) such as 401, 403, etc. This section will describes each of them.
    
    
    * Frequently Asked Questions (FAQ) - Here are answers to some frequently
    asked questions.


    * Contact Us - If you need support or need to get in touch, this is the
    place to look.


    # Getting Started

    ----

    Here the list you should know.

    ## Base URL

    All URLs referenced in the documentation has the following base:


    **Development URL**

    >
    [https://secure.billfazz.com/sandbox/api/v1/](https://secure.billfazz.com/sandbox/api/v1/)


    **Production URL**

    > 
    Production URL & Credential will send through Email after development.


    ## Authentication


    The Billfazz API is served over HTTPS. To ensure data privacy, unencrypted
    HTTP is not supported. Each Endpoint should require Authentication with the
    following method: 


    * [Basic HTTP
    Authentication](https://developer.mozilla.org/en-US/docs/Web/HTTP/Authentication)
    
    Use APIKey as the **value** was given to you and input into Password Basic
    Authentication, you can leave it **blank value** in Username section.

    ~~You can generate your own APIKey by Login into Dashboard > Configuration >
    Generate API Key~~


    ## IP Whitelisting

    Billfazz supports whitelisting client IPs to restrict API access. Requests from non-whitelisted IPs receive HTTP 401 Unauthorized with:

    ```

    {
      "code": "ClientUnauthorizedError",
      "message": "Invalid IP"
    }

    ```

    Integrations should handle this error without treating it as a transaction failure when calling the status-check endpoint.


    # Transaction Flow

    ----

    Our Transaction using an Asynchronous model which mean the first response
    given as 'Pending' status. You can receive the End-Status of Transaction
    using Advice endpoint or your Callback URL. You can provide Callback URL in
    Request body Transaction API.


    # Callback Format

    ----

    A Callback will be triggered after your Transaction changed status into
    End-status (Success, Failed).

    ## Prepaid


    <blockquote>
      All prepaid product except PLN Prepaid, Game, and Ewallet has same structure with Mobile Prepaid.
      <br>
      <b>Note:</b> <code>reference.referenceNo</code> is the serial number issued by the operator for the successful transaction.
    </blockquote>


    ### Mobile Prepaid (Success)

    ```

    {  
      "orderId":44,
      "destinationNo":"081330201994",
      "productCode":"TLKM5",
      "price":5550,
      "balance" : 2110299,
      "refId":"ORDER-01",
      "status":"success",
      "reference":{  
        "referenceNo":"9182918928010921"
      }
    }

    ```

