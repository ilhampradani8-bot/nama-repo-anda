<VirtualHost *:80>
    ServerName api.ilhampradani.me
    ServerAlias www.api.ilhampradani.me

    ProxyPreserveHost On
    ProxyTimeout 3600

    # Mengarahkan semua traffic subdomain ini ke port Rust backend kita (5002)
    ProxyPass / http://127.0.0.1:5002/ keepalive=On
    ProxyPassReverse / http://127.0.0.1:5002/

    ErrorLog ${APACHE_LOG_DIR}/api_ilhampradani_error.log
    CustomLog ${APACHE_LOG_DIR}/api_ilhampradani_access.log combined
</VirtualHost>
